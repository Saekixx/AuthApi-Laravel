<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar Acceso</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <section>
      <div class="login-box" style="height: 400px">
        <form id="forgot-email-form" method="POST">
          <h2>Email</h2>

          <div class="input-box">
            <span class="icon">
              <ion-icon name="mail-outline"></ion-icon>
            </span>
            <input type="email" name="email" id="email" required />
            <label>Correo Electrónico</label>
          </div>

          <button type="submit">Enviar Enlace</button>

          <div class="divider">O</div>

          <button type="button" class="btn-google" id="google-login">
            <img
              src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
              alt="Google Logo"
            />
            Continuar con Google
          </button>

          <div class="register-link">
            <p>¿Recordaste tu cuenta? <a href="login.html">Inicia Sesión</a></p>
          </div>
        </form>
      </div>
    </section>

    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>

    <script type="module" src="js/Auth/obtenerEmail.js"></script>
    <script type="module" src="js/Auth/loginGoogle.js"></script>
  </body>
</html>
